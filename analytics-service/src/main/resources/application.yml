logging:
  level:
    root: INFO

server:
  shutdown: graceful

spring:

  application:
    name: analytics-service

  # Config Server is REQUIRED - if it's unreachable at startup, this
  # service must fail fast rather than boot on stale/missing config.
  config:
    import: configserver:http://localhost:8888

  cloud:

    config:
      fail-fast: true

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}
