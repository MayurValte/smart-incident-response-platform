server:
  port: 8083

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/sirp_incident_db
    username: postgres
    password: root

  jpa:
    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers:
      localhost:29092

    producer:

      key-serializer:
        org.apache.kafka.common.serialization.StringSerializer

      value-serializer:
        org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        enabled: true

        register: true

        service-name: incident-service

management:

  endpoint:

    health:
      show-details: always

  endpoints:

    web:

      exposure:

        include: health,info,metrics

springdoc:

  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs