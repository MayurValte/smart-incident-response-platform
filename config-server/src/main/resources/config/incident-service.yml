server:
  port: 8083

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/sirp_incident_db
    username: postgres
    password: root

  jpa:
    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers:
      localhost:29092

    producer:

      key-serializer:
        org.apache.kafka.common.serialization.StringSerializer

      value-serializer:
        org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        enabled: true

        register: true

        service-name: incident-service

    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

# Circuit breaker around the UserClient Feign call (incident-service -> user-service),
# used by AssignmentValidator when validating an assignee. 4xx responses (e.g.
# assignee doesn't exist) are business outcomes, not backend health signals, and
# InactiveUserException/UserNotFoundException are thrown by AssignmentValidator's
# own post-call checks, not by the Feign call itself - all three are excluded from
# the failure count so only real user-service outages trip the breaker.
resilience4j:

  circuitbreaker:

    instances:

      user-service:

        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException.FeignClientException
          - com.sirp.incident.exception.UserNotFoundException
          - com.sirp.incident.exception.InactiveUserException

management:

  endpoint:

    health:
      show-details: always

  endpoints:

    web:

      exposure:

        include: health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus

springdoc:

  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs