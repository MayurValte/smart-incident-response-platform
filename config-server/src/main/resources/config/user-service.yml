spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_user_db

    username: postgres

    password: root

  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        service-name: user-service

        prefer-ip-address: true

server:
  port: 8081