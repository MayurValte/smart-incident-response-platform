server:
  port: 8080

spring:

  cloud:

    consul:
      host: localhost
      port: 8500

      discovery:
        service-name: api-gateway
        prefer-ip-address: true

# Route table intentionally NOT defined here. GatewayRouteConfig.java
# (com.sirp.gateway.config) is the single source of truth for routing -
# a second, Consul lb://-based route table used to live here too, and the
# two disagreed (this one had a path typo - /api/v1/audit/** instead of
# the real /api/v1/audits - and was missing workflow-service/
# analytics-service entirely). Don't re-add a spring.cloud.gateway.routes
# block here without removing the Java bean, or they'll silently coexist
# again.

# PUBLIC key only - the Gateway verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}