server:
  port: 8082


spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_auth_db

    username: postgres

    password: root


  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration


  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        service-name: auth-service

        prefer-ip-address: true
    openfeign:
      client:

        config:

          default:

            connectTimeout: 3000

            readTimeout: 5000

            loggerLevel: full


jwt:

  public-key: ${JWT_PUBLIC_KEY}

  private-key: ${JWT_PRIVATE_KEY}

  expiration:

    900000


  refresh-expiration:

    604800000



# Circuit breaker around the UserClient Feign call (auth-service -> user-service),
# used by AuthServiceImpl (login/refresh) and CustomUserDetailsService (login).
# 4xx responses (e.g. unknown email) are business outcomes, not backend health
# signals, so they're excluded from the failure count - only 5xx/timeouts/
# connection failures count toward tripping the breaker.
resilience4j:

  circuitbreaker:

    instances:

      user-service:

        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException.FeignClientException


management:

  endpoints:

    web:

      exposure:

        include: health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus


  endpoint:

    health:

      show-details: always



springdoc:

  swagger-ui:

    path:

      /swagger-ui.html

