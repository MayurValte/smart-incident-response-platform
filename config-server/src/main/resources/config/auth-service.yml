server:
  port: 8082


spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_auth_db

    username: postgres

    password: root


  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration


  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        service-name: auth-service

        prefer-ip-address: true
    openfeign:
      client:

        config:

          default:

            connectTimeout: 3000

            readTimeout: 5000

            loggerLevel: full



openfeign:

  client:

    config:

      default:

        connectTimeout: 3000

        readTimeout: 5000



jwt:

  public-key: ${JWT_PUBLIC_KEY}

  private-key: ${JWT_PRIVATE_KEY}

  expiration:

    900000


  refresh-expiration:

    604800000



management:

  endpoints:

    web:

      exposure:

        include: health,info,metrics


  endpoint:

    health:

      show-details: always



springdoc:

  swagger-ui:

    path:

      /swagger-ui.html

