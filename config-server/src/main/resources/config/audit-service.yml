server:
  port: 8084

spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_audit_db

    username: postgres

    password: root

  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers:

      localhost:29092

    consumer:

      group-id: audit-service

      auto-offset-reset: earliest

      key-deserializer:

        org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer:

        org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

    # audit-service is otherwise a pure Kafka consumer (see the topic
    # catalog in CLAUDE.md) - this producer config exists only so
    # KafkaErrorHandlingConfig's DeadLetterPublishingRecoverer has a
    # working KafkaTemplate to republish exhausted-retry records to a
    # per-service .DLT topic, not for any business-event publishing.
    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        enabled: true

        register: true

        service-name: audit-service

management:

  endpoint:

    health:

      show-details: always

  endpoints:

    web:

      exposure:

        include: health,info,metrics,prometheus

springdoc:

  swagger-ui:

    path: /swagger-ui.html

  api-docs:

    path: /v3/api-docs
