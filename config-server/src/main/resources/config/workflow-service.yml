server:
  port: 8086

spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/workflow_db

    username: postgres

    password: root

    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:

      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: localhost:29092

    consumer:

      group-id: workflow-service-group

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        register: true

        service-name: workflow-service

management:

  endpoints:

    web:

      exposure:

        include: health,info,metrics

  endpoint:

    health:

      show-details: always

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}