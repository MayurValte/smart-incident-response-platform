services:

  consul:

    image: hashicorp/consul:1.21

    container_name: sirp-consul

    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"

    command: agent -server -bootstrap -ui -client=0.0.0.0

    restart: unless-stopped


  postgres:

    image: postgres:17

    container_name: sirp-postgres

    environment:

      POSTGRES_DB: sirp

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped


  redis:

    image: redis:8

    container_name: sirp-redis

    ports:
      - "6379:6379"

    restart: unless-stopped


  kafka:

    image: apache/kafka:4.1.0

    container_name: sirp-kafka

    ports:
      - "9092:9092"
      - "29092:29092"

    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@sirp-kafka:9093

      KAFKA_LISTENERS: >
        PLAINTEXT://:9092,
        PLAINTEXT_HOST://:29092,
        CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://sirp-kafka:9092,
        PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    restart: unless-stopped


  kafka-ui:

    image: provectuslabs/kafka-ui:latest

    container_name: sirp-kafka-ui

    ports:
      - "8090:8080"

    environment:

      KAFKA_CLUSTERS_0_NAME: sirp

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: sirp-kafka:9092

      DYNAMIC_CONFIG_ENABLED: "true"

    depends_on:
      - kafka

    restart: unless-stopped


  prometheus:

    image: prom/prometheus:latest

    container_name: sirp-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    extra_hosts:
      # host.docker.internal works out of the box on Docker Desktop
      # (Windows/Mac); this mapping is what makes it resolve on native
      # Linux Docker Engine too, where all 9 services run on the host.
      - "host.docker.internal:host-gateway"

    restart: unless-stopped


  zipkin:

    image: openzipkin/zipkin:latest

    container_name: sirp-zipkin

    ports:
      - "9411:9411"

    restart: unless-stopped


  loki:

    image: grafana/loki:3.0.0

    container_name: sirp-loki

    ports:
      - "3100:3100"

    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

    command: -config.file=/etc/loki/local-config.yaml

    restart: unless-stopped


  grafana:

    image: grafana/grafana:latest

    container_name: sirp-grafana

    ports:
      - "3000:3000"

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

    environment:
      # Anonymous admin access, matching this repo's existing local-dev-only
      # posture for infra (Redis/Kafka also run with no auth) - not for
      # anything but a laptop.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

    depends_on:
      - loki

    restart: unless-stopped


volumes:

  postgres_data:

  loki_data:

  grafana_data: